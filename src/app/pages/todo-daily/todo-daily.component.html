<div class="todo-page">

  <div class="container">

    <!-- ─── PAGE HEADER ──────────────────────────────────────────── -->
    <div class="page-header">
      <div class="header-bg-decoration"></div>
      <div class="header-inner">
        <div class="title-group">
          <div class="title-icon">
            <i class="fas fa-calendar-days"></i>
          </div>
          <div>
            <h1 class="page-title">Daily Planner</h1>
            <p class="page-subtitle">Plan your day, task by task.</p>
          </div>
        </div>
        <div class="header-stats">
          <div class="stat-badge">
            <span class="stat-num">2</span>
            <span class="stat-label">Tasks</span>
          </div>
          <div class="stat-badge accent">
            <span class="stat-num">3</span>
            <span class="stat-label">Pending</span>
          </div>
          <div class="stat-badge done">
            <span class="stat-num">4</span>
            <span class="stat-label">Done</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Add New Todo Button -->
      <button class="btn-add-todo" type="button" (click)="openAddDailyTodoDialog()">
        <span class="btn-add-inner">
          <span class="btn-icon-wrap">
            <i class="fas fa-plus"></i>
          </span>
          <span class="btn-text">Add New Todo</span>
        </span>
        <i class="fas fa-arrow-right btn-arrow"></i>
      </button>

  </div>
</div>

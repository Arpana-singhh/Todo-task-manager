<!-- ── Dialog Header ──────────────────────────────────── -->
<div class="dialog-header">
  <div class="dialog-title-group">
    <div class="dialog-title-icon">
      <i class="fas fa-{{ data?.id ? 'pencil-alt' : 'plus' }}"></i>
    </div>
    <h2 class="dialog-title">{{ data?.id ? 'Edit Task' : 'Add Daily Task' }}</h2>
  </div>
  <button class="btn-dialog-close" type="button" (click)="cancel()">
    <i class="fas fa-times"></i>
  </button>
</div>

<!-- ── Date Context Strip ─────────────────────────────── -->
<div class="month-context-strip">
  <i class="fas fa-calendar-check"></i>
  Adding task for <strong>{{ todayLabel }}</strong>
</div>

<!-- ── Dialog Body ────────────────────────────────────── -->
<mat-dialog-content class="dialog-body">

  <!-- Task Name -->
  <div class="field-group">
    <label class="field-label" for="taskName">
      <i class="fas fa-pen-to-square label-icon"></i>
      Task Name <span class="required-star">*</span>
    </label>
    <mat-form-field appearance="outline" class="full-width mat-field-custom">
      <input
        matInput
        id="taskName"
        [(ngModel)]="taskName"
        placeholder="What needs to be done?"
        #nameInput="ngModel"
        required
        maxlength="120"
      />
      <mat-hint align="end">{{ taskName.length }} / 120</mat-hint>
      <mat-error *ngIf="nameInput.invalid && nameInput.touched">
        Task name is required.
      </mat-error>
    </mat-form-field>
  </div>

  <!-- Task Detail -->
  <div class="field-group">
    <label class="field-label" for="taskDetail">
      <i class="fas fa-align-left label-icon"></i>
      Task Detail
      <span class="optional-tag">optional</span>
    </label>
    <mat-form-field appearance="outline" class="full-width mat-field-custom">
      <textarea
        matInput
        id="taskDetail"
        [(ngModel)]="taskDetail"
        placeholder="Add more context, steps, or notes…"
        rows="4"
        cdkTextareaAutosize
        cdkAutosizeMinRows="3"
        cdkAutosizeMaxRows="7"
        maxlength="500"
      ></textarea>
      <mat-hint align="end">{{ taskDetail.length }} / 500</mat-hint>
    </mat-form-field>
  </div>

  <!-- Task Date (read-only) -->
  <div class="field-group">
    <label class="field-label">
      <i class="fas fa-calendar-day label-icon"></i>
      Task Date
    </label>
    <div class="readonly-date-box">
      <i class="fas fa-lock readonly-date-icon"></i>
      <span class="readonly-date-text">{{ todayLabel }}</span>
      <span class="readonly-date-chip">Today</span>
    </div>
  </div>

</mat-dialog-content>

<!-- ── Dialog Footer ──────────────────────────────────── -->
<mat-dialog-actions class="dialog-footer">
  <button class="btn-cancel" type="button" (click)="cancel()">
    <i class="fas fa-times"></i>
    Cancel
  </button>
  <button
    class="btn-save"
    type="button"
    (click)="save()"
    [disabled]="!taskName.trim()"
  >
    <i class="fas fa-check"></i>
    {{ data?.id ? 'Update Task' : 'Save Task' }}
  </button>
</mat-dialog-actions>

  </defs>

  <rect width="1400" height="360" fill="url(#g)"/>

  <circle cx="260" cy="120" r="120" fill="rgba(255,255,255,0.22)" filter="url(#blur)"/>
  <circle cx="1120" cy="80" r="140" fill="rgba(255,255,255,0.18)" filter="url(#blur)"/>
  <circle cx="980" cy="290" r="150" fill="rgba(255,255,255,0.16)" filter="url(#blur)"/>

  
</svg>

